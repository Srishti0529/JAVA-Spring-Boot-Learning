plugins {
    id 'java'
    id 'application'
}

group = 'com.srishti'
version = '1.0'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.springframework:spring-context:6.1.6'

    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
}

application {
    mainClass = 'com.srishti.Main'
}
test {
    useJUnitPlatform()
}